<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyServis – Cenové ponuky</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f0f3fa;
    color: #222;
    min-height: 100vh;
  }

  .header {
    background: #1B3A8C;
    color: white;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .header img { height: 44px; border-radius: 4px; }
  .header-title { font-size: 20px; font-weight: bold; }
  .header-sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  .main { max-width: 900px; margin: 32px auto; padding: 0 16px 48px; }

  .card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(27,58,140,0.10);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .card-header {
    background: #1B3A8C;
    color: white;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-header.collapsible { cursor: pointer; user-select: none; }
  .card-header.collapsible:hover { background: #1a3580; }
  .card-header .step-num {
    background: #FFD700;
    color: #1B3A8C;
    font-weight: bold;
    font-size: 13px;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-header .chevron { margin-left: auto; font-size: 18px; transition: transform 0.2s; }
  .card-header.collapsed .chevron { transform: rotate(-90deg); }

  .card-body { padding: 22px; }
  .card-body.hidden { display: none; }

  /* UPLOAD */
  .upload-zone {
    border: 2.5px dashed #a0b3e0;
    border-radius: 8px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #f8f9fe;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: #1B3A8C; background: #eef1fb; }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 44px; margin-bottom: 10px; }
  .upload-zone p { color: #555; font-size: 14px; }

  /* FILE LIST */
  .file-list { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .file-item {
    display: flex; align-items: center; gap: 10px;
    background: #f4f6fb; border: 1px solid #d0d9f0;
    border-radius: 6px; padding: 8px 12px; font-size: 13px;
  }
  .file-item .fi-name { flex: 1; font-weight: bold; color: #1B3A8C; }
  .file-item .fi-status { font-size: 12px; color: #666; }
  .file-item .fi-status.ok  { color: #2e7d32; font-weight: bold; }
  .file-item .fi-status.err { color: #c62828; font-weight: bold; }
  .file-item .fi-spinner {
    width: 16px; height: 16px;
    border: 2px solid #d0d9f0; border-top-color: #1B3A8C;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: none; flex-shrink: 0;
  }
  .file-item.processing .fi-spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 10px 20px; border: none; border-radius: 6px;
    font-size: 14px; font-weight: bold; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.42; cursor: not-allowed; }
  .btn-primary { background: #1B3A8C; color: white; }
  .btn-yellow  { background: #FFD700; color: #1B3A8C; }
  .btn-outline { background: white; color: #1B3A8C; border: 2px solid #1B3A8C; }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  /* FORM */
  .section-label {
    font-size: 11px; font-weight: bold; color: #1B3A8C;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin: 18px 0 10px; border-bottom: 2px solid #e0e6f0; padding-bottom: 5px;
  }
  .section-label:first-child { margin-top: 0; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; }
  @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 11px; color: #666; font-weight: bold; }
  .form-group input {
    padding: 7px 10px; border: 1.5px solid #c8d3ed; border-radius: 5px;
    font-size: 13px; color: #222; background: #fafbff;
  }
  .form-group input:focus { outline: none; border-color: #1B3A8C; background: white; }

  /* PRIPLATKY */
  .priplaток-row {
    display: grid; grid-template-columns: 1fr 120px 34px;
    gap: 7px; align-items: center; margin-bottom: 7px;
  }
  .priplaток-row input {
    padding: 7px 10px; border: 1.5px solid #c8d3ed; border-radius: 5px; font-size: 13px;
  }
  .btn-remove {
    background: #fee; border: 1.5px solid #f99; color: #c00;
    border-radius: 5px; cursor: pointer; font-size: 18px;
    width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  }
  .btn-remove:hover { background: #fcc; }
  .btn-add-row {
    background: none; border: 1.5px dashed #a0b3e0; color: #1B3A8C;
    border-radius: 5px; padding: 6px 14px; cursor: pointer; font-size: 12px; margin-top: 4px;
  }
  .btn-add-row:hover { background: #eef1fb; }

  /* RESULT CARD HEADER SUMMARY */
  .result-summary { flex: 1; }
  .result-summary .rs-meno { font-size: 15px; }
  .result-summary .rs-meta { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .rs-cena {
    font-size: 14px; font-weight: bold;
    background: #FFD700; color: #1B3A8C;
    padding: 2px 10px; border-radius: 12px; margin-left: 10px;
  }

  /* DOWNLOAD ROW */
  .download-bar { margin-top: 18px; padding-top: 16px; border-top: 2px solid #f0f3fa; }

  /* SUHRN KARTA */
  .suhrn-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 16px; }
  .suhrn-table th {
    background: #1B3A8C; color: white; padding: 8px 12px; text-align: left; font-size: 12px;
  }
  .suhrn-table th:last-child { text-align: right; }
  .suhrn-table td { padding: 9px 12px; border-bottom: 1px solid #e0e6f0; }
  .suhrn-table td:last-child { text-align: right; font-weight: bold; }
  .suhrn-table .total-row td {
    background: #FFD700; color: #1B3A8C; font-weight: bold;
    font-size: 16px; border-bottom: none;
  }
  .email-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .email-row .form-group { flex: 1; min-width: 220px; }

  /* ALERT */
  .alert {
    display: none; padding: 10px 16px; border-radius: 6px;
    font-size: 13px; margin-top: 12px;
  }
  .alert.visible { display: block; }
  .alert-success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
  .alert-error   { background: #ffeaea; color: #c62828; border-left: 4px solid #e53935; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="header">
  <img src="/static/images/logo_onlyservis.jpg" alt="OnlyServis">
  <div>
    <div class="header-title">only servis s.r.o.</div>
    <div class="header-sub">Systém cenových ponúk</div>
  </div>
</header>

<main class="main">

  <!-- UPLOAD -->
  <div class="card">
    <div class="card-header">
      <span class="step-num">1</span>
      Nahrajte CP_ PDF súbory od Climaxu
    </div>
    <div class="card-body">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="pdfInput" accept=".pdf" multiple>
        <div class="upload-icon">📄</div>
        <p>Pretiahnite jeden alebo viac PDF súborov sem, alebo kliknite na výber</p>
      </div>
      <div class="file-list hidden" id="fileList"></div>
      <div style="margin-top:16px; display:flex; gap:10px; align-items:center;">
        <button class="btn btn-primary" id="btnExtract" onclick="extrahovatVsetky()" disabled>
          ▶ Extrahovať dáta
        </button>
        <span id="extractCount" style="font-size:13px; color:#666;"></span>
      </div>
    </div>
  </div>

  <!-- PRODUKTOVÉ KARTY (dynamicky) -->
  <div id="results"></div>

  <!-- SÚHRNNÁ KARTA (skrytá, kým nie je aspoň 1 výsledok) -->
  <div class="card hidden" id="suhrnKarta">
    <div class="card-header">
      <span class="step-num">✉</span>
      Odoslať zákazníkovi
    </div>
    <div class="card-body">
      <table class="suhrn-table" id="suhrnTable">
        <thead>
          <tr>
            <th>Produkt</th>
            <th>Číslo ponuky</th>
            <th>Ks</th>
            <th>Cena s DPH</th>
          </tr>
        </thead>
        <tbody id="suhrnBody"></tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="3">CELKOVÁ CENA S DPH</td>
            <td id="suhrnCelkom">0,00 €</td>
          </tr>
        </tfoot>
      </table>

      <div class="email-row">
        <div class="form-group">
          <label>Email zákazníka</label>
          <input type="email" id="emailZakaznika" placeholder="zakaznik@email.sk">
        </div>
        <button class="btn btn-yellow" id="btnOdoslat" onclick="odoslatZakazku()">
          ✉ Odoslať zákazníkovi
        </button>
      </div>

      <div class="alert" id="alertSuhrn"></div>
    </div>
  </div>

</main>

<script>
  const pdfInput     = document.getElementById('pdfInput');
  const uploadZone   = document.getElementById('uploadZone');
  const fileListEl   = document.getElementById('fileList');
  const btnExtract   = document.getElementById('btnExtract');
  const extractCount = document.getElementById('extractCount');
  const resultsEl    = document.getElementById('results');
  const suhrnKarta   = document.getElementById('suhrnKarta');

  let selectedFiles = [];
  let fileItemEls   = [];
  let cardIdxMap    = [];   // [{idx, data}] — aktualizuje sa pri každom výsledku

  // --- Výber súborov ---
  pdfInput.addEventListener('change', () => onFilesSelected(Array.from(pdfInput.files)));

  uploadZone.addEventListener('dragover', e => {
    e.preventDefault(); uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('dragover');
    const pdfs = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (pdfs.length) onFilesSelected(pdfs);
  });

  function onFilesSelected(files) {
    selectedFiles = files;
    fileItemEls = [];
    cardIdxMap  = [];
    fileListEl.innerHTML = '';
    fileListEl.classList.remove('hidden');
    resultsEl.innerHTML  = '';
    suhrnKarta.classList.add('hidden');
    document.getElementById('suhrnBody').innerHTML = '';
    document.getElementById('alertSuhrn').className = 'alert';

    files.forEach(f => {
      const el = document.createElement('div');
      el.className = 'file-item';
      el.innerHTML = `
        <div class="fi-spinner"></div>
        <div class="fi-name">📄 ${escHtml(f.name)}</div>
        <div class="fi-status">čaká</div>
      `;
      fileListEl.appendChild(el);
      fileItemEls.push(el);
    });

    btnExtract.disabled = false;
    extractCount.textContent =
      `${files.length} súbor${files.length === 1 ? '' : files.length < 5 ? 'y' : 'ov'}`;
  }

  // --- Extrakcia ---
  async function extrahovatVsetky() {
    btnExtract.disabled = true;
    resultsEl.innerHTML = '';
    cardIdxMap = [];
    suhrnKarta.classList.add('hidden');

    for (let i = 0; i < selectedFiles.length; i++) {
      const file   = selectedFiles[i];
      const itemEl = fileItemEls[i];
      const statusEl = itemEl.querySelector('.fi-status');

      itemEl.classList.add('processing');
      statusEl.textContent = 'extrahujem...';
      statusEl.className   = 'fi-status';

      try {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/extract-pdf', { method: 'POST', body: fd });
        if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).detail) || 'Chyba servera');
        const data = await res.json();

        itemEl.classList.remove('processing');
        statusEl.textContent = '✓ OK';
        statusEl.className   = 'fi-status ok';

        const idx = i;
        cardIdxMap.push({ idx, data });
        vytvoriKartu(data, idx, cardIdxMap.length);
        aktualizujSuhrn();
      } catch (e) {
        itemEl.classList.remove('processing');
        statusEl.textContent = '✗ ' + e.message;
        statusEl.className   = 'fi-status err';
      }
    }

    btnExtract.disabled = false;
  }

  // --- Produktová karta ---
  function vytvoriKartu(data, idx, num) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cardIdx = idx;

    const meno  = data.zakaznik_meno || '–';
    const cislo = data.cislo_ponuky  || '–';
    const cena  = data.cena_s_dph != null ? data.cena_s_dph.toFixed(2) + ' €' : '';

    card.innerHTML = `
      <div class="card-header collapsible" onclick="toggleKarta(this)">
        <span class="step-num">${num}</span>
        <div class="result-summary">
          <div class="rs-meno">${escHtml(meno)} <span class="rs-cena">${escHtml(cena)}</span></div>
          <div style="font-size:12px;opacity:.75;margin-top:2px;">Ponuka č. ${escHtml(cislo)}</div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body">
        ${formHtml(idx)}
        <div class="download-bar">
          <button class="btn btn-outline btn-sm" onclick="stiahnutPdf(${idx})">⬇ Stiahnuť PDF</button>
        </div>
      </div>
    `;

    resultsEl.appendChild(card);
    naplnForm(idx, data);

    // Prepíš cenu v súhrne pri každej zmene poľa cena_s_dph
    const cenaInput = card.querySelector(`[data-field="cena_s_dph"]`);
    cenaInput?.addEventListener('input', aktualizujSuhrn);
  }

  function toggleKarta(h) {
    h.classList.toggle('collapsed');
    h.nextElementSibling.classList.toggle('hidden');
  }

  // --- Súhrn ---
  function aktualizujSuhrn() {
    if (cardIdxMap.length === 0) { suhrnKarta.classList.add('hidden'); return; }

    suhrnKarta.classList.remove('hidden');
    const tbody = document.getElementById('suhrnBody');
    tbody.innerHTML = '';
    let celkom = 0;

    cardIdxMap.forEach(({ idx }) => {
      const d     = getFormData(idx);
      const nazov = d.slovensky_nazov || d.typ_produktu || '–';
      const ks    = d.pocet_ks || 1;
      const cena  = parseFloat(d.cena_s_dph) || 0;
      celkom += cena;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escHtml(nazov)}</td>
        <td>${escHtml(d.cislo_ponuky || '–')}</td>
        <td>${ks}</td>
        <td>${cena.toFixed(2)} €</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('suhrnCelkom').textContent = celkom.toFixed(2) + ' €';

    // Auto-fill email z prvého zákazníka ak ešte prázdny
    const emailInput = document.getElementById('emailZakaznika');
    if (!emailInput.value && cardIdxMap[0]) {
      const prvy = getFormData(cardIdxMap[0].idx);
      // (email nie je v extrakcii, neplníme)
    }

    suhrnKarta.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // --- Odoslať zákazníkovi ---
  async function odoslatZakazku() {
    const email = document.getElementById('emailZakaznika').value.trim();
    if (!email) { setAlert('alertSuhrn', 'error', 'Zadajte email zákazníka.'); return; }
    if (cardIdxMap.length === 0) { setAlert('alertSuhrn', 'error', 'Žiadne produkty na odoslanie.'); return; }

    const ponuky = cardIdxMap.map(({ idx }) => getFormData(idx));

    const btn = document.getElementById('btnOdoslat');
    btn.disabled = true;
    btn.textContent = '⏳ Odosielam...';
    setAlert('alertSuhrn', '', '');

    try {
      const res = await fetch('/send-zakazka', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ponuky, email_zakaznika: email }),
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.detail || 'Chyba servera');
      const meno = ponuky[0]?.zakaznik_meno || '';
      setAlert('alertSuhrn', 'success',
        `✓ Email odoslaný na ${email} — ${result.pocet_pdf} PDF ${result.pocet_pdf === 1 ? 'príloha' : 'prílohy'}.`);
    } catch (e) {
      setAlert('alertSuhrn', 'error', 'Chyba pri odoslaní: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '✉ Odoslať zákazníkovi';
    }
  }

  // --- Formulár HTML ---
  function formHtml(idx) {
    return `
      <div class="section-label">Zákazník a ponuka</div>
      <div class="form-grid">
        <div class="form-group"><label>Číslo ponuky</label><input type="text" data-field="cislo_ponuky" data-idx="${idx}"></div>
        <div class="form-group"><label>Dátum ponuky</label><input type="text" data-field="datum_ponuky" data-idx="${idx}" placeholder="DD.MM.YYYY"></div>
        <div class="form-group"><label>Meno zákazníka</label><input type="text" data-field="zakaznik_meno" data-idx="${idx}"></div>
        <div class="form-group"><label>Mesto</label><input type="text" data-field="zakaznik_mesto" data-idx="${idx}"></div>
      </div>
      <div class="section-label">Produkt</div>
      <div class="form-grid">
        <div class="form-group"><label>Typ produktu (kód)</label><input type="text" data-field="typ_produktu" data-idx="${idx}"></div>
        <div class="form-group"><label>Počet kusov</label><input type="number" data-field="pocet_ks" data-idx="${idx}" min="1"></div>
        <div class="form-group"><label>Šírka (cm)</label><input type="number" data-field="rozmer_sirka_cm" data-idx="${idx}" step="0.1"></div>
        <div class="form-group"><label>Výška (cm)</label><input type="number" data-field="rozmer_vyska_cm" data-idx="${idx}" step="0.1"></div>
      </div>
      <div class="section-label">Ceny</div>
      <div class="form-grid">
        <div class="form-group"><label>Cena bez DPH (€)</label><input type="number" data-field="cena_bez_dph" data-idx="${idx}" step="0.01"></div>
        <div class="form-group"><label>Zľava (%)</label><input type="number" data-field="zlava_percent" data-idx="${idx}" step="0.1" min="0" max="100"></div>
        <div class="form-group"><label>Zľava suma (€)</label><input type="number" data-field="zlava_suma" data-idx="${idx}" step="0.01"></div>
        <div class="form-group"><label>Cena po zľave bez DPH (€)</label><input type="number" data-field="cena_po_zlave" data-idx="${idx}" step="0.01"></div>
        <div class="form-group"><label>DPH (%)</label><input type="number" data-field="dph_percent" data-idx="${idx}" min="0" max="100"></div>
        <div class="form-group"><label>DPH suma (€)</label><input type="number" data-field="dph_suma" data-idx="${idx}" step="0.01"></div>
        <div class="form-group"><label>Cena s DPH (€)</label><input type="number" data-field="cena_s_dph" data-idx="${idx}" step="0.01"></div>
      </div>
      <div class="section-label">Príplatky</div>
      <div class="priplatky-list" data-priplatky="${idx}"></div>
      <button class="btn-add-row" onclick="pridajPriplaток(${idx})">+ Pridať príplatok</button>
    `;
  }

  function naplnForm(idx, d) {
    const fields = [
      'cislo_ponuky','datum_ponuky','zakaznik_meno','zakaznik_mesto',
      'typ_produktu','pocet_ks','rozmer_sirka_cm','rozmer_vyska_cm',
      'cena_bez_dph','zlava_percent','zlava_suma','cena_po_zlave',
      'dph_percent','dph_suma','cena_s_dph'
    ];
    fields.forEach(f => {
      const el = document.querySelector(`[data-field="${f}"][data-idx="${idx}"]`);
      if (el && d[f] != null) el.value = d[f];
    });
    (d.priplatky || []).forEach(p => pridajPriplaток(idx, p.nazov, p.suma));
  }

  function getFormData(idx) {
    const numFields = new Set([
      'pocet_ks','rozmer_sirka_cm','rozmer_vyska_cm','cena_bez_dph',
      'zlava_percent','zlava_suma','cena_po_zlave','dph_percent','dph_suma','cena_s_dph'
    ]);
    const fields = [
      'cislo_ponuky','datum_ponuky','zakaznik_meno','zakaznik_mesto',
      'typ_produktu','pocet_ks','rozmer_sirka_cm','rozmer_vyska_cm',
      'cena_bez_dph','zlava_percent','zlava_suma','cena_po_zlave',
      'dph_percent','dph_suma','cena_s_dph'
    ];
    const data = {};
    fields.forEach(f => {
      const el = document.querySelector(`[data-field="${f}"][data-idx="${idx}"]`);
      const v = el ? el.value : '';
      data[f] = numFields.has(f) ? (v !== '' ? parseFloat(v) : null) : (v || null);
    });
    data.dph_percent = data.dph_percent || 23;

    const priplatky = [];
    document.querySelectorAll(`[data-priplatky="${idx}"] .priplaток-row`).forEach(row => {
      const ins = row.querySelectorAll('input');
      const nazov = ins[0].value.trim();
      const suma  = parseFloat(ins[1].value) || 0;
      if (nazov) priplatky.push({ nazov, suma });
    });
    data.priplatky = priplatky;
    return data;
  }

  function pridajPriplaток(idx, nazov = '', suma = '') {
    const list = document.querySelector(`[data-priplatky="${idx}"]`);
    const row = document.createElement('div');
    row.className = 'priplaток-row';
    row.innerHTML = `
      <input type="text" placeholder="Názov (napr. Montáž)" value="${escHtml(nazov)}">
      <input type="number" placeholder="Suma €" step="0.01" value="${escHtml(suma)}">
      <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
    `;
    list.appendChild(row);
  }

  async function stiahnutPdf(idx) {
    const data = getFormData(idx);
    try {
      const res = await fetch('/generate-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).detail) || 'Chyba');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `OnlyServis_${(data.cislo_ponuky || 'ponuka').replace(/\//g,'_')}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('Chyba pri generovaní PDF: ' + e.message);
    }
  }

  function setAlert(id, type, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'alert';
    el.textContent = msg;
    if (type === 'success') el.classList.add('alert-success', 'visible');
    else if (type === 'error') el.classList.add('alert-error', 'visible');
  }

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  }
</script>

</body>
</html>
